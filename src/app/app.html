@if (!authService.ready()) {
  <div class="loading-screen">
    <div class="spinner"></div>
    <p>Verificando sesión...</p>
  </div>
} @else if (authService.isAuthenticated()) {
  <div class="app-layout">
    <app-sidebar />
    <main class="main-content">
      <router-outlet />
    </main>
  </div>
} @else {
  <router-outlet />
}
